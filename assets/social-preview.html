<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px;
    height: 640px;
    background: #0d1117;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    padding: 80px 90px;
    position: relative;
    overflow: hidden;
  }
  /* Subtle grid background */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  /* Top accent bar */
  body::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #58a6ff, #f78166);
  }
  .content {
    position: relative;
    z-index: 1;
  }
  .label {
    font-size: 18px;
    color: #58a6ff;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .label span {
    color: #8b949e;
  }
  h1 {
    font-size: 56px;
    font-weight: 700;
    color: #f0f6fc;
    margin-bottom: 20px;
    letter-spacing: -1px;
  }
  .tagline {
    font-size: 22px;
    color: #8b949e;
    line-height: 1.5;
    max-width: 820px;
  }
  .stats {
    display: flex;
    gap: 48px;
    margin-top: 48px;
  }
  .stat .number {
    font-size: 36px;
    font-weight: 700;
    color: #58a6ff;
  }
  .stat .unit {
    font-size: 16px;
    color: #8b949e;
    margin-left: 6px;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="label">~/.claude <span>plugin</span></div>
    <h1>coordinator-claude</h1>
    <div class="tagline">Turns Claude Code into an engineering team — a coordinator that delegates, specialists that review, and codified skills that encode how work should flow.</div>
    <div class="stats">
      <div class="stat"><span class="number">6</span><span class="unit">plugins</span></div>
      <div class="stat"><span class="number">38</span><span class="unit">skills</span></div>
      <div class="stat"><span class="number">24</span><span class="unit">agents</span></div>
      <div class="stat"><span class="number">3</span><span class="unit">research pipelines</span></div>
    </div>
  </div>
</body>
</html>
