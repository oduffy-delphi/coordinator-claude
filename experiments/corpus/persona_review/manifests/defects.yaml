# Defect manifest for persona review experiment — expanded corpus (10 files)
# Each defect has a globally unique ID for use as GLMM random effect.
#
# Difficulty distribution target: ~25% obvious, ~40% moderate, ~35% subtle
# Category spread: security, logic, performance, error_handling

experiment: persona_review_v1
version: "0.2.0"

defects:
  # -----------------------------------------------------------------------
  # config_loader.py — CLEAN (0 defects)
  # -----------------------------------------------------------------------
  # No defects seeded. This is a false-positive-only measurement file.

  # -----------------------------------------------------------------------
  # auth_middleware.ts — SPARSE (2 defects)
  # -----------------------------------------------------------------------
  - defect_id: auth_hardcoded_secret
    file: auth_middleware.ts
    line_start: 9
    line_end: 9
    category: security
    severity: critical
    difficulty: obvious
    keywords: ["hardcoded", "secret", "JWT_SECRET", "development-secret", "fallback"]
    description: >
      JWT_SECRET falls back to a hardcoded string "development-secret-key" if
      the environment variable is not set. In production, a missing env var
      would silently use the insecure default, allowing token forgery.
    correct_fix: >
      Remove the fallback value. Throw an error at startup if JWT_SECRET is
      not set in the environment.

  - defect_id: auth_ip_not_validated
    file: auth_middleware.ts
    line_start: 181
    line_end: 183
    category: security
    severity: major
    difficulty: moderate
    keywords: ["req.ip", "clientIp", "IP", "spoofing", "X-Forwarded-For", "proxy", "trust proxy"]
    description: >
      rateLimitAuth uses req.ip directly, which behind a reverse proxy returns
      the proxy's IP (not the client's) unless Express trust proxy is configured.
      An attacker behind a proxy shares the same req.ip as all other users,
      making per-IP rate limiting ineffective, or can bypass it entirely.
    correct_fix: >
      Document that Express trust proxy must be configured, or extract the
      client IP from X-Forwarded-For with proper validation.

  # -----------------------------------------------------------------------
  # cache_manager.py — MODERATE (4 defects)
  # -----------------------------------------------------------------------
  - defect_id: cache_get_many_no_lock
    file: cache_manager.py
    line_start: 123
    line_end: 130
    category: logic
    severity: major
    difficulty: moderate
    keywords: ["get_many", "lock", "thread", "race condition", "atomic", "consistency"]
    description: >
      get_many() calls self.get() in a loop without holding the lock across
      the entire batch. Between individual get() calls, another thread could
      modify or evict entries, producing an inconsistent snapshot.
    correct_fix: >
      Acquire self._lock once for the entire get_many operation and perform
      lookups directly on self._store within that single critical section.

  - defect_id: cache_set_many_no_lock
    file: cache_manager.py
    line_start: 132
    line_end: 136
    category: logic
    severity: major
    difficulty: moderate
    keywords: ["set_many", "lock", "thread", "race condition", "atomic", "batch"]
    description: >
      set_many() calls self.set() in a loop, acquiring and releasing the lock
      for each individual key. This is not atomic — another thread could read
      a partially-updated batch.
    correct_fix: >
      Acquire self._lock once and perform all insertions within a single
      critical section.

  - defect_id: cache_contains_no_stats
    file: cache_manager.py
    line_start: 175
    line_end: 182
    category: logic
    severity: minor
    difficulty: subtle
    keywords: ["__contains__", "stats", "hit", "miss", "tracking", "inconsistent"]
    description: >
      __contains__ checks for key existence and handles expiration, but does
      not update hit/miss statistics. Code using "key in cache" bypasses stats
      tracking, making hit_rate inaccurate if containment checks are common.
    correct_fix: >
      Update self._stats.hits or self._stats.misses inside __contains__,
      consistent with the get() method.

  - defect_id: cache_stats_snapshot_race
    file: cache_manager.py
    line_start: 158
    line_end: 171
    category: logic
    severity: minor
    difficulty: subtle
    keywords: ["stats", "snapshot", "copy", "mutable", "shared", "reference"]
    description: >
      The stats property creates a new CacheStats but copies integer values
      from self._stats while holding the lock. However, it first mutates
      self._stats.current_size inside the lock, meaning the returned snapshot
      shares no mutable state — this is actually fine. But the real issue is
      that between the lock release and the caller using the stats object,
      the stats are already stale. More critically, consecutive calls to
      .stats within the same thread may see inconsistent values if another
      thread is active between calls.
    correct_fix: >
      Document that stats are a point-in-time snapshot. Alternatively, return
      a frozen/immutable stats object and note the timestamp.

  # -----------------------------------------------------------------------
  # data_pipeline.ts — MODERATE (3 defects)
  # -----------------------------------------------------------------------
  - defect_id: pipeline_moving_avg_off_by_one
    file: data_pipeline.ts
    line_start: 178
    line_end: 183
    category: logic
    severity: major
    difficulty: moderate
    keywords: ["movingAverage", "window", "divide", "windowSize", "partial", "average"]
    description: >
      movingAverage divides by windowSize even when the actual window is
      smaller (at the start of the array where i < windowSize - 1). This
      produces artificially low averages for the first windowSize-1 elements.
    correct_fix: >
      Divide by window.length instead of windowSize to correctly handle
      partial windows at the beginning of the array.

  - defect_id: pipeline_aggregate_key_split
    file: data_pipeline.ts
    line_start: 117
    line_end: 118
    category: logic
    severity: major
    difficulty: moderate
    keywords: ["split", "userId", "colon", "key", "destructure", "parse"]
    description: >
      When reconstructing the bucket key, the code splits on ":" and takes
      the first two parts. If userId contains a colon character (which is
      valid in some ID schemes), the split produces an incorrect userId
      and periodStart.
    correct_fix: >
      Use a separator that cannot appear in userId (e.g., a null character
      or a structured key object), or split with a limit of 2.

  - defect_id: pipeline_anomaly_empty_array
    file: data_pipeline.ts
    line_start: 197
    line_end: 202
    category: error_handling
    severity: minor
    difficulty: obvious
    keywords: ["detectAnomalies", "empty", "division", "zero", "length", "NaN"]
    description: >
      detectAnomalies divides by values.length to compute mean and variance.
      If the input events array is empty, this produces NaN, and the filter
      returns an empty array (which is correct by accident, but the NaN
      propagation is a latent bug).
    correct_fix: >
      Return early if events is empty. Add an explicit zero-length guard.

  # -----------------------------------------------------------------------
  # task_scheduler.py — DENSE (7 defects)
  # -----------------------------------------------------------------------
  - defect_id: scheduler_retry_off_by_one
    file: task_scheduler.py
    line_start: 120
    line_end: 125
    category: logic
    severity: minor
    difficulty: moderate
    keywords: ["retry_count", "max_retries", "less than", "off-by-one", "attempt"]
    description: >
      The retry check uses `retry_count < max_retries`, but retry_count is
      incremented before the check. With max_retries=3, the task gets attempts
      at retry_count 1, 2, 3 — only re-queuing at 1 and 2 (2 retries, not 3).
      The initial execution is attempt 0, so total attempts = 1 + 2 = 3,
      not 1 + 3 = 4 as a caller setting max_retries=3 might expect.
    correct_fix: >
      Use `retry_count <= max_retries` to allow the expected number of
      retries, or document that max_retries means max number of re-attempts
      (not total attempts).

  - defect_id: scheduler_deadlock_remaining_stale
    file: task_scheduler.py
    line_start: 172
    line_end: 178
    category: logic
    severity: major
    difficulty: subtle
    keywords: ["deadlock", "remaining", "re-check", "dependency", "unblocked", "stale"]
    description: >
      After awaiting completed tasks, the code re-checks "remaining" for
      newly unblocked tasks — but "remaining" is the list from the *current*
      iteration's extraction pass, not the full queue. Tasks that were put
      back into self._queue via heappush earlier in the loop are not rechecked,
      so newly unblocked tasks may wait an extra iteration.
    correct_fix: >
      Remove the separate "remaining" re-check. Instead, let the main while
      loop naturally re-extract from self._queue on the next iteration.

  - defect_id: scheduler_no_cancel_support
    file: task_scheduler.py
    line_start: 142
    line_end: 186
    category: error_handling
    severity: major
    difficulty: moderate
    keywords: ["cancel", "shutdown", "graceful", "interrupt", "stop", "running"]
    description: >
      The run() method has no cancellation support. If the caller needs to
      stop the scheduler (e.g., on SIGINT), there's no way to cancel
      in-progress tasks or prevent new ones from starting. The _running
      flag exists but is never checked in the execution loop.
    correct_fix: >
      Check self._running in the while loop condition. Add a stop() method
      that sets _running=False and cancels pending asyncio tasks.

  - defect_id: scheduler_heapq_unstable
    file: task_scheduler.py
    line_start: 148
    line_end: 158
    category: logic
    severity: minor
    difficulty: subtle
    keywords: ["heapq", "heappop", "order", "stable", "FIFO", "same priority"]
    description: >
      When multiple tasks have the same priority and created_at, heapq
      falls through to comparing task_id (string comparison), which is
      non-deterministic for UUIDs. This means same-priority tasks may not
      execute in FIFO order.
    correct_fix: >
      Add a monotonically increasing sequence number to ScheduledTask and
      include it in the ordering tuple after priority and before created_at.

  - defect_id: scheduler_dependency_validation
    file: task_scheduler.py
    line_start: 73
    line_end: 96
    category: error_handling
    severity: major
    difficulty: obvious
    keywords: ["dependency", "submit", "validate", "exists", "missing", "reference"]
    description: >
      submit() accepts dependency task IDs without validating that they
      refer to tasks that actually exist in self._tasks. If a caller
      provides a typo'd dependency ID, the task will be permanently blocked
      (eventually detected as a deadlock, but with a misleading error).
    correct_fix: >
      Validate that all dependency IDs exist in self._tasks at submit time.
      Raise ValueError immediately for unknown dependencies.

  - defect_id: scheduler_result_not_awaited
    file: task_scheduler.py
    line_start: 166
    line_end: 171
    category: logic
    severity: minor
    difficulty: moderate
    keywords: ["pending", "asyncio.wait", "done", "result", "exception", "unhandled"]
    description: >
      After asyncio.wait returns, done tasks' results are never retrieved.
      If a task raised an exception that wasn't caught in _execute_task,
      the exception would be silently swallowed (Python logs an
      "exception was never retrieved" warning).
    correct_fix: >
      Iterate over done tasks and call .result() to ensure exceptions are
      properly surfaced. Or add a try/except in _execute_task that catches
      all exceptions (the current code does catch Exception, so this is
      actually mitigated — but the asyncio.Task wrapper exception is still
      not retrieved).

  - defect_id: scheduler_summary_missing_pending
    file: task_scheduler.py
    line_start: 192
    line_end: 207
    category: logic
    severity: minor
    difficulty: obvious
    keywords: ["summary", "pending", "status", "total", "completed", "failed", "missing"]
    description: >
      _build_summary reports completed and failed counts but does not
      report tasks still in PENDING or RUNNING status. If run() exits
      due to deadlock, some tasks may be PENDING but not in the dead_letter
      queue, making the summary's "total = completed + failed" accounting
      incomplete.
    correct_fix: >
      Add a "pending" count to the summary for tasks not completed and
      not dead. Assert total == completed + failed + pending.

  # -----------------------------------------------------------------------
  # payment_processor.py — MODERATE (4 defects)
  # -----------------------------------------------------------------------
  - defect_id: payment_refund_log_pii
    file: payment_processor.py
    line_start: 131
    line_end: 134
    category: security
    severity: major
    difficulty: obvious
    keywords: ["log", "card", "PII", "card_last4", "sensitive", "PCI"]
    description: >
      The refund method logs the last 4 digits of the card number in a
      plain-text log message. Even card_last4 is considered PII under PCI
      DSS and should not appear in application logs that may be aggregated,
      shipped to third-party log services, or persisted without encryption.
    correct_fix: >
      Remove the card_last4 from the log message. Log only the intent_id
      and refund_amount, which are sufficient for audit trail purposes.

  - defect_id: payment_capture_toctou
    file: payment_processor.py
    line_start: 91
    line_end: 96
    category: logic
    severity: major
    difficulty: moderate
    keywords: ["race condition", "TOCTOU", "balance", "concurrent", "atomic", "check"]
    description: >
      The capture method reads the balance into a local variable, checks
      sufficiency, then writes the updated balance. Without any locking or
      transactional mechanism, two concurrent captures for the same customer
      could both see sufficient balance and both deduct, resulting in a
      negative balance (double-spend).
    correct_fix: >
      Use a lock per customer or a compare-and-swap pattern. Alternatively,
      perform the check and deduction atomically within a single operation.

  - defect_id: payment_webhook_decode_before_verify
    file: payment_processor.py
    line_start: 161
    line_end: 161
    category: security
    severity: major
    difficulty: moderate
    keywords: ["decode", "verify", "signature", "UTF-8", "webhook", "payload"]
    description: >
      The webhook verification method decodes the payload from bytes to
      UTF-8 string (line 161) before verifying the HMAC signature. If an
      attacker sends a payload with invalid UTF-8 sequences, the decode
      raises UnicodeDecodeError before the signature is checked, causing
      a denial of service and potentially leaking timing information about
      the verification process.
    correct_fix: >
      Compute the HMAC on the raw bytes. Construct the signed payload as
      bytes (timestamp_bytes + b"." + payload) and only decode to string
      after the signature is verified.

  - defect_id: payment_refund_zero_falsy
    file: payment_processor.py
    line_start: 115
    line_end: 115
    category: logic
    severity: major
    difficulty: subtle
    keywords: ["falsy", "zero", "Decimal", "or", "amount", "default"]
    description: >
      The expression `amount or intent.amount` uses Python truthiness.
      Decimal("0") is falsy, so passing amount=Decimal("0") (intending a
      no-op or zero-adjustment refund) silently becomes a full refund of
      intent.amount. This is a data loss/financial correctness bug.
    correct_fix: >
      Use `amount if amount is not None else intent.amount` to distinguish
      between "not provided" (None) and "explicitly zero" (Decimal(0)).

  # -----------------------------------------------------------------------
  # websocket_handler.ts — MODERATE (3 defects)
  # -----------------------------------------------------------------------
  - defect_id: ws_no_message_size_limit
    file: websocket_handler.ts
    line_start: 188
    line_end: 195
    category: error_handling
    severity: major
    difficulty: obvious
    keywords: ["message", "size", "limit", "JSON.parse", "DoS", "memory", "payload"]
    description: >
      handleMessage parses any incoming WebSocket message with JSON.parse
      without checking the message size first. A malicious client can send
      arbitrarily large messages that consume server memory. There is no
      maxPayload or size guard before the parse attempt.
    correct_fix: >
      Check event.data.length (or byteLength) before parsing. Reject
      messages exceeding a reasonable limit (e.g., 64KB). Alternatively,
      configure maxPayload on the WebSocket server.

  - defect_id: ws_broadcast_all_reserialize
    file: websocket_handler.ts
    line_start: 165
    line_end: 172
    category: performance
    severity: minor
    difficulty: moderate
    keywords: ["broadcast", "JSON.stringify", "serialize", "loop", "per-client", "N times"]
    description: >
      broadcastAll calls JSON.stringify(message) inside the loop for every
      connected client. For N connections, this serializes the same object
      N times. With 10K connections this means 10K identical serializations.
      Compare with broadcastToRoom which correctly delegates to send().
    correct_fix: >
      Hoist JSON.stringify outside the loop: serialize once, then send the
      pre-serialized string to each client.

  - defect_id: ws_close_no_heartbeat_cleanup
    file: websocket_handler.ts
    line_start: 211
    line_end: 222
    category: logic
    severity: major
    difficulty: subtle
    keywords: ["heartbeat", "clearInterval", "timer", "close", "cleanup", "leak", "interval"]
    description: >
      handleClose (triggered by socket.onclose) removes the connection from
      rooms and the connections map, but does not call clearInterval on
      conn.heartbeatTimer. The interval continues firing, attempting to send
      pings to a removed/closed connection. This is both a resource leak
      (timer never garbage-collected) and a source of spurious errors.
      Compare with disconnect() which is never called from handleClose.
    correct_fix: >
      Add clearInterval(conn.heartbeatTimer) in handleClose, or have
      handleClose delegate to disconnect() instead of duplicating cleanup.

  # -----------------------------------------------------------------------
  # user_service.py — MODERATE (3 defects)
  # -----------------------------------------------------------------------
  - defect_id: user_sha256_password
    file: user_service.py
    line_start: 50
    line_end: 52
    category: security
    severity: critical
    difficulty: obvious
    keywords: ["SHA-256", "sha256", "password", "hash", "bcrypt", "argon2", "fast", "brute"]
    description: >
      Passwords are hashed with SHA-256, which is a fast cryptographic hash.
      A single GPU can compute billions of SHA-256 hashes per second, making
      brute-force attacks on the password database trivial even with salting.
      Password hashing requires a deliberately slow algorithm.
    correct_fix: >
      Use bcrypt, scrypt, or argon2id for password hashing. These algorithms
      have configurable work factors that make brute-force infeasible.

  - defect_id: user_get_by_email_returns_deleted
    file: user_service.py
    line_start: 121
    line_end: 127
    category: logic
    severity: major
    difficulty: subtle
    keywords: ["get_by_email", "deleted", "soft-delete", "is_deleted", "inconsistent"]
    description: >
      get_by_email() returns the user object without checking is_deleted.
      Compare with get_user() which filters out deleted users. Any code
      calling get_by_email() directly (e.g., for display, search, or API
      responses) will return soft-deleted users as if they still exist.
      The authenticate() method compensates with its own is_deleted check,
      but the method itself violates the soft-delete contract.
    correct_fix: >
      Add an is_deleted check in get_by_email, consistent with get_user().
      Or extract the check into a shared helper method.

  - defect_id: user_change_password_reuses_salt
    file: user_service.py
    line_start: 241
    line_end: 242
    category: security
    severity: minor
    difficulty: subtle
    keywords: ["salt", "reuse", "password", "change", "new salt", "rainbow"]
    description: >
      change_password reuses the existing salt for the new password hash.
      Best practice is to generate a fresh salt on every password change.
      Reusing the salt means that if the old hash and salt are compromised,
      an attacker who can observe the new hash can determine whether the
      new password is the same as the old one (hashes will match). It also
      reduces the entropy of the salt space over time if passwords are
      changed frequently.
    correct_fix: >
      Generate a new salt via _generate_salt() and update user.salt along
      with user.password_hash.

  # -----------------------------------------------------------------------
  # event_emitter.ts — MODERATE (3 defects)
  # -----------------------------------------------------------------------
  - defect_id: emitter_async_listener_unhandled
    file: event_emitter.ts
    line_start: 138
    line_end: 138
    category: error_handling
    severity: major
    difficulty: moderate
    keywords: ["async", "Promise", "unhandled", "rejection", "await", "try-catch"]
    description: >
      fireEntries calls entry.fn(...args) synchronously. If fn is an async
      function, it returns a Promise. The surrounding try/catch only catches
      synchronous exceptions — the rejected Promise propagates as an
      unhandled rejection, potentially crashing the Node.js process
      (--unhandled-rejections=throw). The Listener type signature explicitly
      allows async functions (Promise<void>).
    correct_fix: >
      Detect or await the return value. If the return is a Promise, attach
      a .catch() handler. Or make fireEntries async and await each listener,
      though this changes the emission semantics.

  - defect_id: emitter_once_splice_during_iteration
    file: event_emitter.ts
    line_start: 136
    line_end: 151
    category: logic
    severity: major
    difficulty: subtle
    keywords: ["splice", "iteration", "once", "for-of", "skip", "remove", "concurrent"]
    description: >
      fireEntries iterates over the entries array with for-of, and when a
      once-listener fires, it splices the entry out of the underlying array
      (via this.listeners.get(eventKey)). Since entries IS the same array
      reference, the splice shifts subsequent elements down. The for-of
      iterator, which tracks by internal index, advances past the shifted
      element — skipping the listener that was immediately after the removed
      once-listener.
    correct_fix: >
      Collect once-listeners to remove after the iteration completes, or
      iterate over a shallow copy of the array (entries.slice()).

  - defect_id: emitter_wildcard_exponential
    file: event_emitter.ts
    line_start: 159
    line_end: 184
    category: performance
    severity: minor
    difficulty: subtle
    keywords: ["wildcard", "recursive", "exponential", "backtrack", "pattern", "DoS"]
    description: >
      matchesWildcard with "**" patterns uses recursive calls that try every
      possible skip position (line 172-179). For a pattern like "**.**.**"
      matched against "a.b.c.d.e", this produces exponential backtracking.
      A malicious or carelessly registered pattern could cause severe
      performance degradation on every emit() call.
    correct_fix: >
      Use dynamic programming or convert the pattern to a regex. For the
      common case, limit ** to appearing at most once per pattern.

  # -----------------------------------------------------------------------
  # file_processor.py — MODERATE (3 defects)
  # -----------------------------------------------------------------------
  - defect_id: file_path_traversal
    file: file_processor.py
    line_start: 179
    line_end: 179
    category: security
    severity: critical
    difficulty: obvious
    keywords: ["path traversal", "sanitize", "filename", "backslash", "directory", "escape"]
    description: >
      _build_storage_path sanitizes the filename by replacing ".." and "/"
      but does not handle backslashes (\), which are valid path separators
      on Windows. A filename like "..\\..\\etc\\passwd" bypasses the
      sanitization and traverses outside the storage directory. The
      blocklist approach to path sanitization is inherently fragile.
    correct_fix: >
      Use Path(filename).name or os.path.basename(filename) to extract
      only the filename component, stripping all directory components
      regardless of separator.

  - defect_id: file_size_check_after_full_read
    file: file_processor.py
    line_start: 96
    line_end: 118
    category: error_handling
    severity: major
    difficulty: moderate
    keywords: ["size", "check", "read", "stream", "max_size", "upload", "after"]
    description: >
      The file stream is fully read and written to the temp file (lines
      96-106) before the size check on line 109. A 10GB upload will be
      written in full to the temp file before being rejected. The size
      check should be streaming — checked after each chunk with early
      termination.
    correct_fix: >
      Move the size check inside the while loop. After each chunk, check
      if total_size > self._max_size and return REJECTED immediately if so.

  - defect_id: file_temp_leak_on_reject
    file: file_processor.py
    line_start: 108
    line_end: 168
    category: error_handling
    severity: major
    difficulty: subtle
    keywords: ["temp", "cleanup", "leak", "NamedTemporaryFile", "delete", "finally"]
    description: >
      The temp file is created with delete=False. On the happy path it's
      moved to storage or quarantine (shutil.move). But on two error paths —
      size rejection (line 110, returns without cleanup) and the except
      block (line 159, returns without cleanup) — the temp file is left on
      disk. Over time this accumulates orphaned temp files, especially
      under adversarial upload patterns.
    correct_fix: >
      Add a finally block (or use a try/finally wrapper) that calls
      os.unlink(tmp.name) if the temp file still exists at the original
      path (i.e., was not moved).
